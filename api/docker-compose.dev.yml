services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApiKey__Key: ${BDEPLOYER_API_KEY:-development-only-key}
      ConnectionStrings__DefaultConnection: Data Source=/app/data/bdeployer.db
      Deployment__ProjectsRoot: /opt/bdeployer/projects
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      HOME: /root
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - api_dev_data:/app/data
      - api_dev_obj:/app/obj
      - api_dev_bin:/app/bin
      - ${BDEPLOYER_PROJECTS_ROOT:-./dev-projects}:/opt/bdeployer/projects
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  api_dev_data:
  api_dev_obj:
  api_dev_bin:
